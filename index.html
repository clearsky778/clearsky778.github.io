<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 리밸런싱 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #cccab8;
    --text1: #1a1916;
    --text2: #6b6a64;
    --text3: #a09f98;
    --accent: #2a5c3f;
    --accent-light: #e8f0eb;
    --danger: #b83232;
    --danger-light: #fbeaea;
    --warning: #b87c10;
    --warning-light: #fdf3e0;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 16px; height: 16px; fill: white; }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text1);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text3);
    margin-left: 2px;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    color: var(--text2);
    background: transparent;
    transition: all 0.15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }

  .tab.active {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text1);
  }

  .tab:hover:not(.active) { color: var(--text1); background: var(--surface2); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .total-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .total-label {
    font-size: 14px;
    color: var(--text2);
    white-space: nowrap;
  }

  .total-input {
    width: 200px;
    font-size: 18px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    background: var(--surface);
    color: var(--text1);
    transition: border-color 0.15s;
  }

  .total-input:focus { outline: none; border-color: var(--accent); }

  .total-unit { font-size: 14px; color: var(--text2); }

  .total-formatted {
    font-size: 14px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .edit-btn {
    margin-left: auto;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text2);
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .edit-btn:hover { background: var(--surface2); color: var(--text1); }
  .edit-btn.active-btn { background: var(--surface2); border-color: var(--border2); color: var(--text1); }

  /* 비중 바 */
  .pct-bar-wrap {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    gap: 1px;
    margin-bottom: 10px;
    background: var(--surface2);
  }

  .pct-bar-seg { height: 100%; transition: width 0.25s ease; }

  .pct-sum-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .pct-sum-label { font-size: 12px; color: var(--text3); }
  .pct-sum-val { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .pct-ok { color: var(--accent); }
  .pct-over { color: var(--danger); }
  .pct-under { color: var(--warning); }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 540px;
  }

  th {
    padding: 8px 12px;
    text-align: right;
    color: var(--text3);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th.left { text-align: left; }

  td {
    padding: 10px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    color: var(--text1);
    vertical-align: middle;
    font-size: 13px;
  }

  td.left { text-align: left; }

  tr:last-child td { border-bottom: none; }

  tr.foot-row td {
    font-weight: 600;
    background: var(--surface2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  tr:hover:not(.foot-row) td { background: #fafaf7; }

  .num-input {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 8px;
    background: var(--surface);
    color: var(--text1);
    transition: border-color 0.15s;
  }

  .num-input:focus { outline: none; border-color: var(--accent); }

  .pct-wrap { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }

  .pct-input {
    width: 54px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 6px;
    background: var(--surface);
    color: var(--text1);
    transition: border-color 0.15s;
  }

  .pct-input:focus { outline: none; border-color: var(--accent); }
  .pct-unit { font-size: 12px; color: var(--text3); }

  .etf-name { font-size: 13px; font-weight: 500; display: block; }
  .order-num { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; display: block; }

  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    flex-shrink: 0;
    vertical-align: middle;
  }

  .positive { color: var(--accent); font-family: 'DM Mono', monospace; }
  .negative { color: var(--danger); font-family: 'DM Mono', monospace; }
  .mono { font-family: 'DM Mono', monospace; }

  /* 요약 카드 */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 1.25rem;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
  }

  .s-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.3px; }

  .s-value {
    font-size: 17px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--text1);
  }

  /* 편집 패널 */
  .edit-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    animation: slideDown 0.2s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .edit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  .edit-title { font-size: 13px; font-weight: 600; color: var(--text1); }

  .scope-btns { display: flex; gap: 6px; }

  .scope-btn {
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }

  .scope-btn.on {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
    background: var(--accent-light);
  }

  .etf-edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .edit-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .edit-order {
    width: 92px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    text-align: left;
  }

  .edit-name {
    flex: 1;
    font-size: 12px;
    text-align: left;
    min-width: 100px;
  }

  .del-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    line-height: 1;
  }

  .del-btn:hover { background: var(--danger-light); color: var(--danger); border-color: #e8b3b3; }

  .add-area {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }

  .add-btn {
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .add-btn:hover { background: var(--surface2); color: var(--text1); }

  .apply-btn {
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 7px 18px;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
    margin-left: auto;
  }

  .apply-btn:hover { background: #214e34; }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }

  @media (max-width: 600px) {
    main { padding: 1.25rem 1rem 3rem; }
    .summary-row { grid-template-columns: 1fr; gap: 8px; }
    .edit-btn { margin-left: 0; }
    .total-row { gap: 8px; }
    .total-input { width: 160px; font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M2 12 L8 4 L14 12 Z"/></svg>
    </div>
    <div>
      <span class="logo-text">ETF 리밸런싱</span>
      <span class="logo-sub">계산기</span>
    </div>
  </div>
</header>

<main>
  <div class="tabs" id="tabBar">
    <button class="tab active" onclick="switchTab(0)">연금저축</button>
    <button class="tab" onclick="switchTab(1)">퇴직연금 IRP</button>
    <button class="tab" onclick="switchTab(2)">ISA</button>
    <button class="tab" onclick="switchTab(3)">퇴직연금 DC</button>
  </div>

  <div class="card" style="margin-bottom:1rem;">
    <div class="total-row">
      <span class="total-label">총 투자금액</span>
      <input type="number" class="total-input" id="totalInput" placeholder="0" oninput="onTotalChange()">
      <span class="total-unit">원</span>
      <span class="total-formatted" id="totalFormatted"></span>
      <button class="edit-btn" id="editToggleBtn" onclick="toggleEdit()">종목 편집</button>
    </div>
  </div>

  <div id="editPanel" style="display:none;">
    <div class="edit-panel">
      <div class="edit-header">
        <span class="edit-title">종목 편집</span>
        <div class="scope-btns">
          <button class="scope-btn on" id="scope-this" onclick="setScope('this')">이 계좌만</button>
          <button class="scope-btn" id="scope-all" onclick="setScope('all')">전체 계좌 동일 적용</button>
        </div>
      </div>
      <div id="etfEditList"></div>
      <div class="add-area">
        <input type="text" class="num-input edit-order" id="newOrder" placeholder="주문번호" style="width:92px;text-align:left;font-family:'DM Mono',monospace;font-size:12px;">
        <input type="text" class="num-input edit-name" id="newName" placeholder="종목명 입력" style="flex:1;text-align:left;min-width:120px;font-size:12px;">
        <button class="add-btn" onclick="addEtf()">+ 추가</button>
        <button class="apply-btn" onclick="applyEdit()">적용하기</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="pct-bar-wrap" id="pctBar"></div>
    <div class="pct-sum-row">
      <span class="pct-sum-label">비중 합계</span>
      <span class="pct-sum-val" id="pctSumVal">0%</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="left" style="width:200px;">종목</th>
            <th style="width:110px;">비중</th>
            <th style="width:140px;">목표금액</th>
            <th style="width:130px;">현재금액</th>
            <th style="width:130px;">사야할금액</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="s-label">목표금액 합계</div>
      <div class="s-value" id="sumTarget">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">현재금액 합계</div>
      <div class="s-value" id="sumCurrent">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">사야할금액 합계</div>
      <div class="s-value" id="sumToBuy">—</div>
    </div>
  </div>
</main>

<footer>개인 투자 참고용 계산기입니다. 투자 판단의 최종 책임은 본인에게 있습니다.</footer>

<script>
const COLORS = ['#2a7a52','#3b7dd8','#b07020','#b83258','#6b52cc','#c05528','#2a8a8a','#6a9a2a','#888','#c03232','#1a5e8a','#7a3a8a'];

const ACCOUNT_DEFS = [
  {
    name: '연금저축',
    etfs: [
      { order: '379810', name: 'Kodex 미국나스닥100' },
      { order: '458730', name: 'Tiger 미국배당다우존스' },
      { order: '241180', name: 'Tiger 일본니케이225' },
      { order: '294400', name: 'Kosef 200TR' },
      { order: '283580', name: 'Kodex 차이나 CSI300' },
      { order: '453870', name: 'Tiger 인도니프티50' },
      { order: '411060', name: 'Ace krx금현물' },
      { order: '476760', name: 'Ace 미국30년국채액티브' },
      { order: '385560', name: 'RISE KIS국고채 30년 Enhanced' },
    ],
    pcts: [10, 9, 6, 9, 9, 8, 19, 15, 15],
  },
  {
    name: '퇴직연금 IRP',
    etfs: [
      { order: '379810', name: 'Kodex 미국나스닥100' },
      { order: '458730', name: 'Tiger 미국배당다우존스' },
      { order: '241180', name: 'Tiger 일본니케이225' },
      { order: '294400', name: 'Kosef 200TR' },
      { order: '283580', name: 'Kodex 차이나 CSI300' },
      { order: '453870', name: 'Tiger 인도니프티50' },
      { order: '411060', name: 'Ace krx금현물' },
      { order: '476760', name: 'Ace 미국30년국채액티브' },
      { order: '385560', name: 'RISE KIS국고채 30년 Enhanced' },
    ],
    pcts: [10, 9, 6, 9, 9, 8, 19, 15, 15],
  },
  {
    name: 'ISA',
    etfs: [
      { order: '379810', name: 'Kodex 미국나스닥100' },
      { order: '458730', name: 'Tiger 미국배당다우존스' },
      { order: '241180', name: 'Tiger 일본니케이225' },
      { order: '294400', name: 'Kosef 200TR' },
      { order: '283580', name: 'Kodex 차이나 CSI300' },
      { order: '453870', name: 'Tiger 인도니프티50' },
      { order: '411060', name: 'Ace krx금현물' },
      { order: '476760', name: 'Ace 미국30년국채액티브' },
      { order: '385560', name: 'RISE KIS국고채 30년 Enhanced' },
    ],
    pcts: [10, 9, 6, 9, 9, 8, 19, 15, 15],
  },
  {
    name: '퇴직연금 DC',
    etfs: [
      { order: '379810', name: 'Kodex 미국나스닥100' },
      { order: '458730', name: 'Tiger 미국배당다우존스' },
      { order: '241180', name: 'Tiger 일본니케이225' },
      { order: '278530', name: 'KODEX 200TR' },
      { order: '283580', name: 'Kodex 차이나 CSI300' },
      { order: '453810', name: 'KODEX 인도Nifty50' },
      { order: '411060', name: 'Ace krx금현물' },
      { order: '0085P0', name: 'Ace 미국10년국채액티브' },
      { order: '365780', name: 'Ace 국고채10년' },
    ],
    pcts: [10, 9, 6, 9, 9, 8, 19, 15, 15],
  },
];

const state = ACCOUNT_DEFS.map(def => ({
  total: '',
  etfs: def.etfs.map(e => ({ ...e })),
  pcts: [...def.pcts],
  currents: def.etfs.map(() => ''),
}));

let currentTab = 0;
let editScope = 'this';
let editOpen = false;
let tempEtfs = [];

function fmt(n) {
  if (n === '' || n === null || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('ko-KR') + '원';
}

function fmtShort(n) {
  if (!n) return '';
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억원';
  if (n >= 10000) return Math.round(n / 10000).toLocaleString() + '만원';
  return n.toLocaleString('ko-KR') + '원';
}

function clr(i) { return COLORS[i % COLORS.length]; }

function switchTab(idx) {
  if (editOpen) closeEdit();
  saveMainState();
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  renderTable();
}

function saveMainState() {
  state[currentTab].total = document.getElementById('totalInput').value;
  document.querySelectorAll('.pct-input').forEach((inp, i) => {
    if (i < state[currentTab].pcts.length) state[currentTab].pcts[i] = parseFloat(inp.value) || 0;
  });
  document.querySelectorAll('.current-input').forEach((inp, i) => {
    if (i < state[currentTab].currents.length) state[currentTab].currents[i] = inp.value;
  });
}

function onTotalChange() {
  const val = parseFloat(document.getElementById('totalInput').value) || 0;
  document.getElementById('totalFormatted').textContent = val ? '≈ ' + fmtShort(val) : '';
  recalc();
}

function onPctChange(i) {
  state[currentTab].pcts[i] = parseFloat(document.querySelectorAll('.pct-input')[i].value) || 0;
  recalc();
}

function onCurrentChange(i) {
  state[currentTab].currents[i] = document.querySelectorAll('.current-input')[i].value;
  recalc();
}

function recalc() {
  const s = state[currentTab];
  const total = parseFloat(document.getElementById('totalInput').value) || 0;
  const pcts = s.pcts;
  const sum = pcts.reduce((a, b) => a + b, 0);

  const pctSumEl = document.getElementById('pctSumVal');
  pctSumEl.textContent = Math.round(sum * 10) / 10 + '%';
  pctSumEl.className = 'pct-sum-val ' + (Math.abs(sum - 100) < 0.05 ? 'pct-ok' : sum > 100 ? 'pct-over' : 'pct-under');

  document.getElementById('pctBar').innerHTML = pcts.map((p, i) =>
    `<div class="pct-bar-seg" style="width:${p}%;background:${clr(i)};"></div>`
  ).join('');

  let sumT = 0, sumC = 0, sumB = 0;
  s.etfs.forEach((etf, i) => {
    const target = total * ((pcts[i] || 0) / 100);
    const cur = parseFloat(document.querySelectorAll('.current-input')[i]?.value) || 0;
    const toBuy = target - cur;

    const tel = document.getElementById('target-' + i);
    if (tel) tel.textContent = total ? fmt(target) : '—';

    const bel = document.getElementById('tobuy-' + i);
    if (bel) {
      if (!total) { bel.textContent = '—'; bel.className = 'mono'; }
      else if (toBuy > 0) { bel.textContent = fmt(toBuy); bel.className = 'positive'; }
      else if (toBuy < 0) { bel.textContent = '−' + fmt(Math.abs(toBuy)); bel.className = 'negative'; }
      else { bel.textContent = '0원'; bel.className = 'mono'; }
    }
    sumT += target; sumC += cur; sumB += toBuy;
  });

  document.getElementById('sumTarget').textContent = total ? fmt(sumT) : '—';
  document.getElementById('sumCurrent').textContent = sumC ? fmt(sumC) : '—';
  const stEl = document.getElementById('sumToBuy');
  if (!total) { stEl.textContent = '—'; stEl.style.color = ''; }
  else {
    stEl.textContent = (sumB < 0 ? '−' : '') + fmt(Math.abs(sumB));
    stEl.style.color = sumB > 0 ? 'var(--accent)' : sumB < 0 ? 'var(--danger)' : '';
  }
}

function renderTable() {
  const s = state[currentTab];
  document.getElementById('totalInput').value = s.total;
  document.getElementById('totalFormatted').textContent = s.total ? '≈ ' + fmtShort(parseFloat(s.total)) : '';

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  s.etfs.forEach((etf, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="left">
        <span class="dot" style="background:${clr(i)};"></span>
        <span class="etf-name">${etf.name}</span>
        <span class="order-num">${etf.order || ''}</span>
      </td>
      <td>
        <div class="pct-wrap">
          <input type="number" class="pct-input" value="${s.pcts[i] || 0}" min="0" max="100" step="0.5" oninput="onPctChange(${i})">
          <span class="pct-unit">%</span>
        </div>
      </td>
      <td class="mono" id="target-${i}">—</td>
      <td><input type="number" class="num-input current-input" placeholder="0" value="${s.currents[i]}" oninput="onCurrentChange(${i})" style="width:110px;"></td>
      <td id="tobuy-${i}" class="mono">—</td>
    `;
    tbody.appendChild(tr);
  });

  const tfoot = document.createElement('tr');
  tfoot.className = 'foot-row';
  tfoot.innerHTML = `<td class="left" colspan="2">합계</td><td id="sfTarget">—</td><td>—</td><td>—</td>`;
  tbody.appendChild(tfoot);
  recalc();
}

function toggleEdit() { editOpen ? closeEdit() : openEdit(); }

function openEdit() {
  editOpen = true;
  document.getElementById('editToggleBtn').classList.add('active-btn');
  document.getElementById('editToggleBtn').textContent = '편집 닫기';
  document.getElementById('editPanel').style.display = 'block';
  editScope = 'this';
  document.getElementById('scope-this').classList.add('on');
  document.getElementById('scope-all').classList.remove('on');
  renderEditList();
}

function closeEdit() {
  editOpen = false;
  document.getElementById('editToggleBtn').classList.remove('active-btn');
  document.getElementById('editToggleBtn').textContent = '종목 편집';
  document.getElementById('editPanel').style.display = 'none';
}

function setScope(s) {
  editScope = s;
  document.getElementById('scope-this').classList.toggle('on', s === 'this');
  document.getElementById('scope-all').classList.toggle('on', s === 'all');
}

function renderEditList() {
  tempEtfs = state[currentTab].etfs.map(e => ({ ...e }));
  const el = document.getElementById('etfEditList');
  el.innerHTML = '';
  tempEtfs.forEach((etf, i) => {
    const row = document.createElement('div');
    row.className = 'etf-edit-row';
    row.innerHTML = `
      <div class="edit-dot" style="background:${clr(i)};"></div>
      <input type="text" class="num-input edit-order" placeholder="주문번호" value="${etf.order || ''}" oninput="tempEtfs[${i}].order=this.value" style="width:92px;text-align:left;font-family:'DM Mono',monospace;font-size:12px;">
      <input type="text" class="num-input edit-name" placeholder="종목명" value="${etf.name}" oninput="tempEtfs[${i}].name=this.value" style="flex:1;text-align:left;font-size:12px;min-width:100px;">
      <button class="del-btn" onclick="deleteEtf(${i})">×</button>
    `;
    el.appendChild(row);
  });
}

function deleteEtf(i) {
  tempEtfs.splice(i, 1);
  renderEditList();
}

function addEtf() {
  const order = document.getElementById('newOrder').value.trim();
  const name = document.getElementById('newName').value.trim();
  if (!name) { document.getElementById('newName').focus(); return; }
  tempEtfs.push({ order, name });
  document.getElementById('newOrder').value = '';
  document.getElementById('newName').value = '';
  renderEditList();
}

function applyEdit() {
  const newEtfs = tempEtfs.map(e => ({ order: e.order, name: e.name }));
  const targets = editScope === 'all' ? [0, 1, 2, 3] : [currentTab];
  targets.forEach(idx => {
    const old = state[idx];
    state[idx].etfs = newEtfs.map(e => ({ ...e }));
    state[idx].pcts = newEtfs.map(etf => {
      const m = old.etfs.findIndex(o => o.order === etf.order && o.name === etf.name);
      return m >= 0 ? (old.pcts[m] || 0) : 0;
    });
    state[idx].currents = newEtfs.map(etf => {
      const m = old.etfs.findIndex(o => o.order === etf.order && o.name === etf.name);
      return m >= 0 ? (old.currents[m] || '') : '';
    });
  });
  closeEdit();
  renderTable();
}

renderTable();
</script>
</body>
</html>
