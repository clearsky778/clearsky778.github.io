<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 리밸런싱 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0; --surface:#fff; --surface2:#f0efe9;
  --border:#e2e0d8; --border2:#cccab8;
  --text1:#1a1916; --text2:#6b6a64; --text3:#a09f98;
  --accent:#2a5c3f; --accent-light:#e8f0eb;
  --danger:#b83232; --danger-light:#fbeaea;
  --warning:#b87c10; --warning-light:#fdf3e0;
  --r:8px; --rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;}
.hinner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;height:56px;}
.lmark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lmark svg{width:16px;height:16px;fill:white;}
.ltxt{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.lsub{font-size:12px;color:var(--text3);margin-left:2px;}
main{max-width:1400px;margin:0 auto;padding:2rem 2.5rem 4rem;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:2rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 20px;font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:var(--r) var(--r) 0 0;color:var(--text2);background:transparent;transition:all .15s;white-space:nowrap;margin-bottom:-1px;}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--text1);}
.tab:hover:not(.active){color:var(--text1);background:var(--surface2);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.5rem;margin-bottom:1.25rem;}
.total-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tlabel{font-size:14px;color:var(--text2);white-space:nowrap;}
.tinput{width:200px;font-size:18px;font-family:'DM Mono',monospace;font-weight:500;text-align:right;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;background:var(--surface);color:var(--text1);transition:border-color .15s;cursor:text;white-space:nowrap;overflow:hidden;min-height:42px;line-height:1.4;}
.tinput:focus{outline:none;border-color:var(--accent);}
.tunit{font-size:14px;color:var(--text2);}
.tfmt{font-size:14px;color:var(--text3);font-family:'DM Mono',monospace;}
.fetch-btn{font-size:13px;font-family:'Noto Sans KR',sans-serif;color:#fff;background:var(--accent);border:1px solid var(--accent);border-radius:var(--r);padding:7px 16px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.fetch-btn:hover{background:#214e34;}
.fetch-btn:disabled{background:var(--text3);border-color:var(--text3);cursor:not-allowed;}
.edit-btn{margin-left:auto;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);background:none;border:1px solid var(--border);border-radius:var(--r);padding:7px 16px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.edit-btn:hover{background:var(--surface2);color:var(--text1);}
.edit-btn.on{background:var(--surface2);border-color:var(--border2);color:var(--text1);}
.pbar-wrap{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;margin-bottom:10px;background:var(--surface2);}
.pbar-seg{height:100%;transition:width .25s ease;}
.psum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.psum-lbl{font-size:12px;color:var(--text3);}
.psum-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace;}
.ok{color:var(--accent);} .over{color:var(--danger);} .under{color:var(--warning);}
.twrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px;}
th{padding:8px 12px;text-align:right;color:var(--text3);font-weight:500;font-size:11px;letter-spacing:.3px;border-bottom:1px solid var(--border);white-space:nowrap;}
th.L{text-align:left;}
td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);color:var(--text1);vertical-align:middle;font-size:13px;}
td.L{text-align:left;}
tr:last-child td{border-bottom:none;}
tr.frow td{font-weight:600;background:var(--surface2);font-family:'DM Mono',monospace;font-size:12px;}
tr:hover:not(.frow) td{background:#fafaf7;}

/* 실제비중 셀 */
.rpct-cell{text-align:right;}
.rpct{font-family:'DM Mono',monospace;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;}
.badge-warn{background:var(--warning-light);color:var(--warning);}
.badge-danger{background:var(--danger-light);color:var(--danger);}

/* 행 하이라이트 */
tr.row-warn td{background:#fffdf5;}
tr.row-warn:hover td{background:#fff8e8;}
tr.row-danger td{background:#fff8f8;}
tr.row-danger:hover td{background:#ffeaea;}

.ni{font-size:13px;font-family:'DM Mono',monospace;text-align:right;border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;background:var(--surface);color:var(--text1);transition:border-color .15s;}
.ni:focus{outline:none;border-color:var(--accent);}
.pw{display:flex;align-items:center;gap:4px;justify-content:flex-end;}
.pi{width:54px;font-size:13px;font-family:'DM Mono',monospace;text-align:right;border:1px solid var(--border);border-radius:var(--r);padding:5px 6px;background:var(--surface);color:var(--text1);transition:border-color .15s;}
.pi:focus{outline:none;border-color:var(--accent);}
.pu{font-size:12px;color:var(--text3);}
.ename{font-size:13px;font-weight:500;display:block;}
.enum{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;display:block;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;vertical-align:middle;}
.pos{color:var(--accent);font-family:'DM Mono',monospace;}
.neg{color:var(--danger);font-family:'DM Mono',monospace;}
.mono{font-family:'DM Mono',monospace;}
.cwrap{position:relative;display:inline-block;width:130px;}
.cdisp{width:130px;font-size:13px;font-family:'DM Mono',monospace;text-align:right;border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;background:var(--surface);color:var(--text1);cursor:text;transition:border-color .15s;display:block;white-space:nowrap;overflow:hidden;min-height:29px;line-height:1.5;}
.cdisp:focus{outline:none;border-color:var(--accent);}
.cdisp.ph{color:var(--text3);}

/* 경고 배너 */
.alert-box{border-radius:var(--r);padding:10px 14px;margin-bottom:1.25rem;font-size:13px;display:none;align-items:flex-start;gap:10px;line-height:1.5;}
.alert-box.show{display:flex;}
.alert-warn{background:var(--warning-light);border:1px solid #e8c87a;color:#7a5200;}
.alert-danger{background:var(--danger-light);border:1px solid #e8b3b3;color:#7a1e1e;}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.alert-text strong{font-weight:600;}

.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:1.25rem;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;}
.slbl{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.3px;}
.sval{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text1);}

/* 범례 */
.legend{display:flex;gap:16px;margin-bottom:1rem;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}

.epanel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.5rem;margin-bottom:1.25rem;animation:sd .2s ease;}
@keyframes sd{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.eheader{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.etitle{font-size:13px;font-weight:600;}
.sbtns{display:flex;gap:6px;}
.sbtn{font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:5px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;}
.sbtn.on{border-color:var(--accent);color:var(--accent);font-weight:500;background:var(--accent-light);}
.erow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.edot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.delbtn{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;}
.delbtn:hover{background:var(--danger-light);color:var(--danger);border-color:#e8b3b3;}
.addarea{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap;}
.addbtn{font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:7px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.addbtn:hover{background:var(--surface2);color:var(--text1);}
.applybtn{font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:7px 18px;border:1px solid var(--accent);border-radius:var(--r);background:var(--accent);color:#fff;cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s;margin-left:auto;}
.applybtn:hover{background:#214e34;}
.naver-link{
  display:inline-flex;align-items:center;justify-content:center;
  margin-left:6px;
  width:18px;height:18px;
  font-size:11px;font-style:normal;text-decoration:none;
  background:var(--accent-light);color:var(--accent);
  border-radius:4px;border:1px solid #b8d4c0;
  vertical-align:middle;
  transition:all .15s;
  flex-shrink:0;
}
.naver-link:hover{background:var(--accent);color:#fff;}
footer{text-align:center;padding:2rem;font-size:12px;color:var(--text3);border-top:1px solid var(--border);margin-top:2rem;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text1);color:#fff;font-size:12px;padding:8px 20px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:680px){
  main{padding:1rem 0.875rem 3rem;}
  .tabs{gap:2px;}
  .tab{padding:9px 12px;font-size:13px;}

  /* 총액 입력 */
  .total-row{gap:8px;}
  .tinput{width:150px;font-size:16px;}
  .edit-btn{margin-left:0;padding:7px 12px;}

  /* 테이블 → 카드형으로 */
  .twrap{overflow-x:visible;}
  table,thead,tbody,th,td,tr{display:block;}
  thead{display:none;}
  tr:not(.frow){
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--r);
    margin-bottom:10px;
    padding:12px 14px;
    transition:background .15s;
  }
  tr:not(.frow):hover{background:var(--surface);}
  tr.row-warn{border-left:3px solid var(--warning)!important;}
  tr.row-danger{border-left:3px solid var(--danger)!important;}
  tr.row-warn td,tr.row-danger td{background:transparent!important;}

  td{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:none!important;
    padding:5px 0;
    font-size:13px;
    text-align:right;
  }
  td.L{display:block;padding-bottom:10px;border-bottom:1px solid var(--border)!important;margin-bottom:6px;}
  td::before{
    content:attr(data-label);
    font-size:11px;
    color:var(--text3);
    text-align:left;
    flex-shrink:0;
    margin-right:8px;
  }
  td.L::before{display:none;}

  /* 종목명 */
  .ename{font-size:14px;}

  /* 입력창 크게 */
  .pi{width:64px;font-size:14px;padding:7px 8px;}
  .cwrap{width:140px;}
  .cdisp{width:140px;font-size:14px;padding:7px 10px;min-height:34px;}

  /* 합계 행 */
  tr.frow{
    display:flex;justify-content:space-between;
    background:var(--surface2);border-radius:var(--r);
    padding:10px 14px;margin-bottom:0;
    border:1px solid var(--border);
  }
  tr.frow td{padding:0;border:none!important;font-size:12px;}
  tr.frow td::before{display:none;}

  /* 요약카드 */
  .srow{grid-template-columns:1fr;gap:8px;}
  .sc{padding:14px 16px;}
  .sval{font-size:16px;}

  /* 경고배너 */
  .alert-box{font-size:12px;}

  /* 범례 */
  .legend{gap:10px;margin-bottom:0.875rem;}
  .legend-item{font-size:11px;}

  /* 편집패널 */
  .erow{flex-wrap:wrap;}
  .addarea{gap:6px;}
  .applybtn{width:100%;margin-left:0;margin-top:4px;text-align:center;padding:10px;}

  /* 현재가 + 보유수량 나란히 */
  td[data-label="현재가"],
  td[data-label="보유수량"]{
    width:calc(50% - 4px);
    display:inline-flex;
    vertical-align:top;
  }
  td[data-label="현재가"]{ margin-right:4px; }

  /* 사야할금액 + 매수주수 강조 */
  td[data-label="사야할금액"],
  td[data-label="매수주수"]{
    padding-top:8px;
    margin-top:4px;
    border-top:1px dashed var(--border)!important;
    font-size:14px;
  }
  td[data-label="매수주수"]{
    font-size:15px;
    font-weight:700;
  }
  td[data-label="매수주수"]::before{
    font-size:12px;
    font-weight:400;
  }
}

/* 가로 방향 (landscape) — 테이블 형태로 복원하되 모바일에 맞게 압축 */
@media(max-width:900px) and (orientation:landscape){
  main{padding:0.875rem 1rem 2rem;}

  /* 탭 */
  .tabs{margin-bottom:1rem;}
  .tab{padding:7px 14px;font-size:13px;}

  /* 총액 */
  .tinput{width:160px;font-size:15px;min-height:38px;}
  .total-row{gap:10px;}
  .fetch-btn{font-size:13px;font-family:'Noto Sans KR',sans-serif;color:#fff;background:var(--accent);border:1px solid var(--accent);border-radius:var(--r);padding:7px 16px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.fetch-btn:hover{background:#214e34;}
.fetch-btn:disabled{background:var(--text3);border-color:var(--text3);cursor:not-allowed;}
.edit-btn{margin-left:auto;}

  /* 테이블 원래대로 복원 */
  .twrap{overflow-x:auto;}
  table{display:table;min-width:720px;}
  thead{display:table-header-group;}
  tbody{display:table-row-group;}
  tr:not(.frow){
    display:table-row;
    background:transparent;
    border:none;
    border-radius:0;
    margin-bottom:0;
    padding:0;
  }
  tr.row-warn{border-left:none!important;}
  tr.row-danger{border-left:none!important;}
  tr.row-warn td{background:#fffdf5!important;}
  tr.row-danger td{background:#fff8f8!important;}
  tr:not(.frow):hover td{background:#fafaf7;}
  th{display:table-cell;padding:7px 8px;font-size:11px;}
  td{
    display:table-cell;
    padding:7px 8px;
    font-size:12px;
    border-bottom:1px solid var(--border)!important;
    justify-content:unset;
  }
  td.L{
    display:table-cell;
    padding-bottom:7px;
    border-bottom:1px solid var(--border)!important;
    margin-bottom:0;
  }
  td::before{display:none;}
  td.L::before{display:none;}

  /* 입력창 컴팩트 */
  .pi{width:48px;font-size:12px;padding:4px 5px;}
  .cwrap{width:100px;}
  .cdisp{width:100px;font-size:12px;padding:4px 6px;min-height:26px;}
  .ename{font-size:12px;}
  .enum{font-size:10px;}

  /* 합계행 */
  tr.frow{
    display:table-row;
    background:var(--surface2);
    border-radius:0;
    padding:0;
    border:none;
  }
  tr.frow td{
    display:table-cell;
    padding:7px 8px;
    font-size:12px;
    border:none!important;
  }
  tr.frow td::before{display:none;}

  /* 요약카드 가로 3열 유지 */
  .srow{grid-template-columns:repeat(3,1fr);gap:8px;margin-top:1rem;}
  .sc{padding:10px 14px;}
  .slbl{font-size:10px;}
  .sval{font-size:14px;}

  /* 경고배너 */
  .alert-box{font-size:12px;padding:8px 12px;}

  /* 범례 */
  .legend{margin-bottom:0.75rem;}

  /* 편집패널 */
  .applybtn{width:auto;margin-left:auto;margin-top:0;}
  .addarea{flex-wrap:nowrap;}
}
</style>
</head>
<body>
<header>
  <div class="hinner">
    <div class="lmark"><svg viewBox="0 0 16 16"><path d="M2 12 L8 4 L14 12 Z"/></svg></div>
    <div><span class="ltxt">ETF 리밸런싱</span><span class="lsub">계산기</span></div>
  </div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">연금저축</button>
    <button class="tab" onclick="switchTab(1)">퇴직연금 IRP</button>
    <button class="tab" onclick="switchTab(2)">ISA</button>
    <button class="tab" onclick="switchTab(3)">퇴직연금 DC</button>
  </div>

  <div class="card" style="margin-bottom:1rem;">
    <div class="total-row">
      <span class="tlabel">총 투자금액</span>
      <div class="tinput" id="totalInput" contenteditable="true" inputmode="numeric" data-raw="" onfocus="onTFocus()" onkeydown="onTKeydown(event)" oninput="onTInput()" onblur="onTBlur()"></div>
      <span class="tunit">원</span>
      <span class="tfmt" id="totalFmt"></span>
      <button class="edit-btn" id="editBtn" onclick="toggleEdit()">종목 편집</button>
      <button class="fetch-btn" id="fetchBtn" onclick="fetchAllPrices()">📡 현재가 불러오기</button>
    </div>
  </div>

  <div id="editPanel" style="display:none;">
    <div class="epanel">
      <div class="eheader">
        <span class="etitle">종목 편집</span>
        <div class="sbtns">
          <button class="sbtn on" id="sThis" onclick="setScope('this')">이 계좌만</button>
          <button class="sbtn" id="sAll" onclick="setScope('all')">전체 계좌 동일 적용</button>
        </div>
      </div>
      <div id="editList"></div>
      <div class="addarea">
        <input type="text" class="ni" id="newOrder" placeholder="주문번호" style="width:92px;text-align:left;font-size:12px;">
        <input type="text" class="ni" id="newName" placeholder="종목명 입력" style="flex:1;text-align:left;min-width:120px;font-size:12px;">
        <button class="addbtn" onclick="addEtf()">+ 추가</button>
        <button class="applybtn" onclick="applyEdit()">적용하기</button>
      </div>
    </div>
  </div>

  <!-- 경고 배너 -->
  <div class="alert-box alert-danger" id="alertDanger">
    <span class="alert-icon">!</span>
    <span class="alert-text" id="alertDangerText"></span>
  </div>
  <div class="alert-box alert-warn" id="alertWarn">
    <span class="alert-icon">△</span>
    <span class="alert-text" id="alertWarnText"></span>
  </div>

  <div class="card">
    <div class="pbar-wrap" id="pbar"></div>
    <div class="psum-row">
      <span class="psum-lbl">비중 합계</span>
      <span class="psum-val" id="psumVal">0%</span>
    </div>

    <!-- 범례 -->
    <div class="legend">
      <span class="legend-item">
        <span class="badge badge-danger">±10% 초과</span>
        매도 검토 필요
      </span>
      <span class="legend-item">
        <span class="badge badge-warn">±5% 초과</span>
        비중 이탈 주의
      </span>
    </div>

    <div class="twrap">
      <table>
        <thead>
          <tr>
            <th class="L" style="width:220px;">종목</th>
            <th style="width:120px;">목표비중</th>
            <th style="width:130px;">실제비중</th>

const state=DEFS.map(d=>({

// localStorage 저장/불러오기 (종목·비중만)
function saveToStorage(showToast=false){
  const data=state.map(s=>({
    etfs:s.etfs.map(e=>({...e})),
    pcts:[...s.pcts],
  }));
  try{localStorage.setItem('etf-rb-v2',JSON.stringify(data));}catch(e){}
  if(showToast)showSaved();
}

let _toastTimer=null;
function showSaved(){
  const t=document.getElementById('toast');
  if(!t)return;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem('etf-rb-v2');
    if(!raw)return;
    const data=JSON.parse(raw);
    data.forEach((d,i)=>{
      if(!state[i])return;
      if(d.etfs&&d.etfs.length>0){
        // order, name 둘 다 있는 항목만 유효한 것으로 처리
        const validEtfs=d.etfs.filter(e=>e&&typeof e.name==='string'&&e.name.trim()!=='');
        if(validEtfs.length>0){
          state[i].etfs=validEtfs.map(e=>({order:e.order||'',name:e.name}));
          state[i].currents=validEtfs.map(()=>'');
          state[i].prices=validEtfs.map(()=>'');
          state[i].quantities=validEtfs.map(()=>'');
        }
      }
      if(d.pcts&&d.pcts.length>0)state[i].pcts=[...d.pcts];
    });
  }catch(e){}
}

function fmt(n){
  if(n===''||n===null||isNaN(n))return'—';
  return Math.round(n).toLocaleString('ko-KR')+'원';
}
function fmtS(n){
  if(!n)return'';
  if(n>=100000000)return(n/100000000).toFixed(1)+'억원';
  if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';
  return n.toLocaleString('ko-KR')+'원';
}
function clr(i){return COLORS[i%COLORS.length];}

function switchTab(idx){
  if(editOpen)closeEdit();
  saveState();
  tab=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderTable();
}

function saveState(){
  state[tab].total=document.getElementById('totalInput').dataset.raw||'';
  document.querySelectorAll('.pi').forEach((inp,i)=>{
    if(i<state[tab].pcts.length)state[tab].pcts[i]=parseFloat(inp.value)||0;
  });
  document.querySelectorAll('.cdisp').forEach((el,i)=>{
    if(i<state[tab].currents.length)state[tab].currents[i]=el.dataset.raw||'';
  });
  document.querySelectorAll('.price-input').forEach((el,i)=>{
    if(i<state[tab].prices.length)state[tab].prices[i]=el.dataset.raw||'';
  });
  document.querySelectorAll('.qty-input').forEach((el,i)=>{
    if(i<state[tab].quantities.length)state[tab].quantities[i]=el.dataset.raw||'';
  });
  saveToStorage();
}

function onTFocus(){

  const raw=el.dataset.raw||'';
  el.textContent=raw;
  const r=document.createRange(),s=window.getSelection();
  r.selectNodeContents(el);r.collapse(false);
  s.removeAllRanges();s.addRange(r);
}
function onTKeydown(e){

  if(ok.includes(e.key)||e.key>='0'&&e.key<='9')return;
  e.preventDefault();
}
function onTInput(){
  const el=document.getElementById('totalInput');
  const digits=el.textContent.replace(/[^0-9]/g,'');
  el.dataset.raw=digits;
  const v=parseFloat(digits)||0;
  document.getElementById('totalFmt').textContent=v?'≈ '+fmtS(v):'';
  recalc();
}
function onTBlur(){

/* 현재가 입력 */
function onPriceFocus(e,i){

function recalc(){
  const s=state[tab];
  const total=getTotalVal();
  const pcts=s.pcts;
  const psum=pcts.reduce((a,b)=>a+b,0);

  const pEl=document.getElementById('psumVal');
  pEl.textContent=Math.round(psum*10)/10+'%';
  pEl.className='psum-val '+(Math.abs(psum-100)<0.05?'ok':psum>100?'over':'under');

  document.getElementById('pbar').innerHTML=pcts.map((p,i)=>
    `<div class="pbar-seg" style="width:${p}%;background:${clr(i)};"></div>`
  ).join('');

  let sT=0,sCur=0,sB=0;
  const warnList=[],dangerList=[];

  // 전체 보유금액 합산 (실제비중 계산용)
  const totalCur=s.etfs.reduce((acc,etf,i)=>{
    const price=parseFloat(s.prices[i])||0;
    const qty=parseFloat(s.quantities[i])||0;
    const cur = price&&qty ? price*qty : (parseFloat(s.currents[i])||0);
    return acc+cur;
  },0);

  s.etfs.forEach((etf,i)=>{
    const price=parseFloat(s.prices[i])||0;
    const qty=parseFloat(s.quantities[i])||0;
    // 현재가 × 보유수량이 있으면 자동계산, 없으면 직접입력값 사용
    const cur = price&&qty ? price*qty : (parseFloat(s.currents[i])||0);
    // 보유금액 자동 동기화
    if(price&&qty) s.currents[i]=String(Math.round(cur));

    const target=total*((pcts[i]||0)/100);
    const buy=target-cur;

    // 실제비중
    const realPct=totalCur>0?(cur/totalCur*100):0;
    const targetPct=pcts[i]||0;
    const diff=realPct-targetPct;
    const absDiff=Math.abs(diff);
    let level=0;
    if(totalCur>0&&absDiff>=10)level=2;
    else if(totalCur>0&&absDiff>=5)level=1;

    const tr=document.getElementById('row'+i);
    if(tr)tr.className=level===2?'row-danger':level===1?'row-warn':'';

    const rEl=document.getElementById('rpct'+i);
    if(rEl){
      if(totalCur>0){
        const sign=diff>0?'+':'';
        let badge='';
        if(level===2)badge=`<span class="badge badge-danger">${sign}${diff.toFixed(1)}%p</span>`;
        else if(level===1)badge=`<span class="badge badge-warn">${sign}${diff.toFixed(1)}%p</span>`;
        rEl.innerHTML=`<span class="rpct">${realPct.toFixed(1)}% ${badge}</span>`;
      } else {
        rEl.innerHTML='<span class="mono" style="color:var(--text3)">—</span>';
      }
    }

    if(totalCur>0){
      if(level===2)dangerList.push({name:etf.name,diff,realPct,targetPct});
      else if(level===1)warnList.push({name:etf.name,diff,realPct,targetPct});
    }

    // 목표금액
    const tel=document.getElementById('t'+i);
    if(tel)tel.textContent=total?fmt(target):'—';

    // 보유금액
    const cel=document.getElementById('cur'+i);
    if(cel)cel.textContent=cur>0?fmt(cur):'—';

    // 사야할금액
    const bel=document.getElementById('b'+i);
    if(bel){
      if(!total){bel.textContent='—';bel.className='mono';}
      else if(buy>0){bel.textContent=fmt(buy);bel.className='pos';}
      else if(buy<0){bel.textContent='−'+fmt(Math.abs(buy));bel.className='neg';}
      else{bel.textContent='0원';bel.className='mono';}
    }

    // 매수주수
    const qel=document.getElementById('qty'+i);
    if(qel){
      if(!total||!price){qel.textContent='—';qel.className='mono';}
      else if(buy>0){
        const shares=Math.floor(buy/price);
        qel.textContent=shares>0?shares+'주':'0주';
        qel.className=shares>0?'pos':'mono';
      } else if(buy<0){
        const shares=Math.floor(Math.abs(buy)/price);
        qel.textContent=shares>0?'-'+shares+'주':'0주';
        qel.className=shares>0?'neg':'mono';
      } else {
        qel.textContent='0주';qel.className='mono';
      }
    }

    sT+=target; sCur+=cur; sB+=buy;
  });

  // 경고 배너
  const dBox=document.getElementById('alertDanger');
  const wBox=document.getElementById('alertWarn');
  if(dangerList.length>0){
    const names=dangerList.map(d=>{const sign=d.diff>0?'+':'';return `<strong>${d.name}</strong>(${d.realPct.toFixed(1)}% / 목표 ${d.targetPct}%, ${sign}${d.diff.toFixed(1)}%p)`;}).join(', ');
    document.getElementById('alertDangerText').innerHTML=`목표 비중과 <strong>10%p 이상</strong> 차이가 납니다. 매도 또는 집중 매수 검토를 권장합니다. → ${names}`;
    dBox.classList.add('show');
  } else { dBox.classList.remove('show'); }
  if(warnList.length>0){
    const names=warnList.map(d=>{const sign=d.diff>0?'+':'';return `<strong>${d.name}</strong>(${d.realPct.toFixed(1)}% / 목표 ${d.targetPct}%, ${sign}${d.diff.toFixed(1)}%p)`;}).join(', ');
    document.getElementById('alertWarnText').innerHTML=`목표 비중과 <strong>5%p 이상</strong> 차이가 납니다. 다음 적립 시 해당 종목 위주로 매수하세요. → ${names}`;
    wBox.classList.add('show');
  } else { wBox.classList.remove('show'); }

  document.getElementById('sTarget').textContent=total?fmt(sT):'—';
  document.getElementById('sCurrent').textContent=sCur?fmt(sCur):'—';
  const sfCur=document.getElementById('sfCur');
  if(sfCur)sfCur.textContent=sCur?fmt(sCur):'—';
  const stEl=document.getElementById('sToBuy');
  if(!total){stEl.textContent='—';stEl.style.color='';}
  else{
    stEl.textContent=(sB<0?'−':'')+fmt(Math.abs(sB));
    stEl.style.color=sB>0?'var(--accent)':sB<0?'var(--danger)':'';
  }
}

function renderTable(){
  const s=state[tab];
  // prices, quantities 배열 길이 맞추기
  while(s.prices.length<s.etfs.length)s.prices.push('');
  while(s.quantities.length<s.etfs.length)s.quantities.push('');
  const tEl=document.getElementById('totalInput');
  tEl.dataset.raw=s.total||'';
  const tNum=parseFloat(s.total)||0;
  tEl.textContent=tNum>0?tNum.toLocaleString('ko-KR'):'';
  document.getElementById('totalFmt').textContent=tNum?'≈ '+fmtS(tNum):'';

  // 경고 배너 초기화
  document.getElementById('alertDanger').classList.remove('show');
  document.getElementById('alertWarn').classList.remove('show');

  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  s.etfs.forEach((etf,i)=>{
    const raw=s.currents[i]||'';
    const num=parseFloat(raw)||0;
    const dispVal=num>0?num.toLocaleString('ko-KR'):'0';
    const tr=document.createElement('tr');
    tr.id='row'+i;
    const priceRaw=s.prices[i]||'';
    const priceNum=parseFloat(priceRaw)||0;
    const priceDisp=priceNum>0?priceNum.toLocaleString('ko-KR'):'0';
    const qtyRaw=s.quantities[i]||'';
    const qtyNum=parseFloat(qtyRaw)||0;
    tr.innerHTML=`
      <td class="L">
        <span class="dot" style="background:${clr(i)};"></span>
        <span class="ename">${etf.name}${etf.order?`<a class="naver-link" href="https://finance.naver.com/item/main.naver?code=${etf.order}" target="_blank" title="네이버 증권에서 현재가 확인">↗</a>`:''}</span>
        <span class="enum">${etf.order||''}</span>
      </td>
      <td data-label="목표비중">
        <div class="pw">
          <input type="number" class="pi" value="${s.pcts[i]||0}" min="0" max="100" step="0.5" oninput="onPctChange(${i})">
          <span class="pu">%</span>
        </div>
      </td>
      <td class="rpct-cell" id="rpct${i}" data-label="실제비중"><span class="mono" style="color:var(--text3)">—</span></td>
      <td class="mono" id="t${i}" data-label="목표금액">—</td>
      <td data-label="현재가">
        <div class="cwrap" style="width:120px;">
          <div class="cdisp price-input${priceNum===0?' ph':''}"
            contenteditable="true"
            inputmode="numeric"
            data-raw="${priceRaw}"
            data-idx="${i}"
            onfocus="onPriceFocus(event,${i})"
            onkeydown="onCKeydown(event,${i})"
            oninput="onPriceInput(event,${i})"
            onblur="onPriceBlur(event,${i})"
            style="width:120px;"
          >${priceDisp}</div>
        </div>
      </td>
      <td data-label="보유수량">
        <div class="cwrap" style="width:90px;">
          <div class="cdisp qty-input${qtyNum===0?' ph':''}"
            contenteditable="true"
            inputmode="numeric"
            data-raw="${qtyRaw}"
            data-idx="${i}"
            onfocus="onQtyFocus(event,${i})"
            onkeydown="onCKeydown(event,${i})"
            oninput="onQtyInput(event,${i})"
            onblur="onQtyBlur(event,${i})"
            style="width:90px;"
          >${qtyNum>0?qtyNum:0}</div>
        </div>
      </td>
      <td class="mono" id="cur${i}" data-label="보유금액">—</td>
      <td id="b${i}" class="mono" data-label="사야할금액">—</td>
      <td id="qty${i}" class="mono" data-label="매수주수" style="font-weight:600;color:var(--accent);">—</td>
    `;
    tbody.appendChild(tr);
  });

  const tf=document.createElement('tr');
  tf.className='frow';
  tf.innerHTML=`<td class="L" colspan="3">합계</td><td>—</td><td colspan="2"></td><td id="sfCur">—</td><td>—</td><td></td>`;
  tbody.appendChild(tf);
  recalc();
}

function toggleEdit(){editOpen?closeEdit():openEdit();}

function openEdit(){
  editOpen=true;
  document.getElementById('editBtn').classList.add('on');
  document.getElementById('editBtn').textContent='편집 닫기';
  document.getElementById('editPanel').style.display='block';
  scope='this';
  document.getElementById('sThis').classList.add('on');
  document.getElementById('sAll').classList.remove('on');
  renderEditList();
}

function closeEdit(){
  editOpen=false;
  document.getElementById('editBtn').classList.remove('on');
  document.getElementById('editBtn').textContent='종목 편집';
  document.getElementById('editPanel').style.display='none';
}

function setScope(s){
  scope=s;
  document.getElementById('sThis').classList.toggle('on',s==='this');
  document.getElementById('sAll').classList.toggle('on',s==='all');
}

function renderEditList(){
  tempEtfs=state[tab].etfs.map(e=>({...e}));
  const el=document.getElementById('editList');
  el.innerHTML='';
  tempEtfs.forEach((etf,i)=>{
    const row=document.createElement('div');
    row.className='erow';
    row.innerHTML=`
      <div class="edot" style="background:${clr(i)};"></div>
      <input type="text" class="ni" placeholder="주문번호" value="${etf.order||''}" oninput="tempEtfs[${i}].order=this.value" style="width:92px;text-align:left;font-family:'DM Mono',monospace;font-size:12px;">
      <input type="text" class="ni" placeholder="종목명" value="${etf.name}" oninput="tempEtfs[${i}].name=this.value" style="flex:1;text-align:left;font-size:12px;min-width:100px;">
      <button class="delbtn" onclick="delEtf(${i})">×</button>
    `;
    el.appendChild(row);
  });
}

function delEtf(i){tempEtfs.splice(i,1);renderEditList();}

function addEtf(){
  const order=document.getElementById('newOrder').value.trim();
  const name=document.getElementById('newName').value.trim();
  if(!name){document.getElementById('newName').focus();return;}
  tempEtfs.push({order,name});
  document.getElementById('newOrder').value='';
  document.getElementById('newName').value='';
  renderEditList();
}

function applyEdit(){
  const newEtfs=tempEtfs.map(e=>({order:e.order,name:e.name}));
  const targets=scope==='all'?[0,1,2,3]:[tab];
  targets.forEach(idx=>{
    const old=state[idx];
    state[idx].etfs=newEtfs.map(e=>({...e}));
    state[idx].pcts=newEtfs.map(e=>{
      const m=old.etfs.findIndex(o=>o.order===e.order&&o.name===e.name);
      return m>=0?(old.pcts[m]||0):0;
    });
    state[idx].currents=newEtfs.map(e=>{
      const m=old.etfs.findIndex(o=>o.order===e.order&&o.name===e.name);
      return m>=0?(old.currents[m]||''):'';
    });
    state[idx].prices=newEtfs.map(e=>{
      const m=old.etfs.findIndex(o=>o.order===e.order&&o.name===e.name);
      return m>=0?(old.prices[m]||''):'';
    });
    state[idx].quantities=newEtfs.map(e=>{
      const m=old.etfs.findIndex(o=>o.order===e.order&&o.name===e.name);
      return m>=0?(old.quantities[m]||''):'';
    });
  });
  saveToStorage(true);
  closeEdit();
  renderTable();
}

// 비중 변경 시에도 즉시 저장
const _origOnPctChange=onPctChange;

loadFromStorage();
renderTable();

const SERVER = 'https://etc-server-production.up.railway.app';

async function fetchAllPrices(){
  const s=state[tab];
  const codes=s.etfs.map(e=>e.order).filter(c=>c&&c.trim()!=='');
  if(codes.length===0){alert('주문번호가 없는 종목은 현재가를 불러올 수 없습니다.');return;}

  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;
  btn.textContent='⏳ 불러오는 중...';

  try{
    const res=await fetch(`${SERVER}/prices?codes=${codes.join(',')}`);
    const data=await res.json();

    let successCount=0;
    s.etfs.forEach((etf,i)=>{
      if(etf.order&&data[etf.order]){
        const price=data[etf.order];
        state[tab].prices[i]=String(price);
        // UI 업데이트
        const els=document.querySelectorAll('.price-input');
        if(els[i]){
          els[i].dataset.raw=String(price);
          els[i].textContent=price.toLocaleString('ko-KR');
          els[i].classList.remove('ph');
        }
        successCount++;
      }
    });

    recalc();
    btn.textContent=`✅ ${successCount}개 완료`;
    setTimeout(()=>{btn.disabled=false;btn.textContent='📡 현재가 불러오기';},3000);

  }catch(e){
    btn.disabled=false;
    btn.textContent='📡 현재가 불러오기';
    alert('현재가를 불러오는 데 실패했습니다. 서버를 확인해주세요.');
  }
}
</script>
